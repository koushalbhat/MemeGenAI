<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Meme Generator</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        h1 {
            text-align: center;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .hero-panel {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        input[type="text"], select {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
            box-sizing: border-box;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: var(--border);
            cursor: not-allowed;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 1rem;
            font-weight: bold;
            color: #a78bfa;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .results {
            display: none;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            gap: 2rem;
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
        }

        .result-panel {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .result-panel h3 {
            margin-top: 0;
            margin-bottom: 1rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .image-container img {
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            background-color: #fff;
        }

        pre {
            background-color: var(--bg);
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid var(--border);
            color: #10b981;
            font-size: 0.9rem;
            margin: 0;
            height: 100%;
        }

        @media (max-width: 768px) {
            .results {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>MemeGen AI</h1>
        <p class="subtitle">Multimodal Meme Generation via Gemini Vision</p>

        <div class="hero-panel">
            <form id="memeForm">
                <div class="form-group">
                    <label for="userIdea">Your Setup / Idea</label>
                    <input type="text" id="userIdea" placeholder="e.g. When the code compiles perfectly on the first try..." required>
                </div>
                
                <div class="form-group">
                    <label for="templateName">Template Selection</label>
                    <select id="templateName">
                        <option value="">Auto-Detect (Let AI choose the best format)</option>
                    </select>
                </div>

                <button type="submit" id="generateBtn">Generate Meme</button>
            </form>
            <div id="loadingText" class="loading">Loading AI Vision Engine...</div>
        </div>

        <div id="resultsPanel" class="results">
            <div class="result-panel">
                <h3>Final Rendered Meme</h3>
                <div class="image-container" id="memeImageContainer">
                    <!-- Image will be injected here -->
                </div>
            </div>
            <div class="result-panel">
                <h3>Gemini Layout Reasonings</h3>
                <pre id="jsonOutput">
                    <!-- JSON will be injected here -->
                </pre>
            </div>
        </div>
    </div>

    <script>
        // Dynamically load available templates on startup
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch('/api/templates');
                const data = await res.json();
                
                const selectElement = document.getElementById('templateName');
                if (data.status === 'success') {
                    data.templates.forEach(t => {
                        const option = document.createElement('option');
                        option.value = t;
                        option.textContent = t.replace(/_/g, ' ') + " Template";
                        selectElement.appendChild(option);
                    });
                }
            } catch(e) {
                console.error("Failed to fetch template mapping", e);
            }
        });

        document.getElementById('memeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const userIdea = document.getElementById('userIdea').value;
            const templateName = document.getElementById('templateName').value;
            
            const btn = document.getElementById('generateBtn');
            const loading = document.getElementById('loadingText');
            const results = document.getElementById('resultsPanel');
            
            // UI States
            btn.disabled = true;
            loading.style.display = 'block';
            results.style.display = 'none';

            const payload = {
                user_idea: userIdea
            };
            
            if (templateName) {
                payload.template_name = templateName;
            }

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                
                if (data.status === 'success') {
                    // Update Image Gallery
                    const container = document.getElementById('memeImageContainer');
                    container.innerHTML = ''; // clear loading state
                    
                    data.output_image_paths.forEach((path, idx) => {
                        const filename = path.split('\\').pop().split('/').pop();
                        const imgUrl = '/output/' + filename;
                        
                        // Adding stylistic spacing between variants
                        const imgElem = `<img src="${imgUrl}?t=${new Date().getTime()}" alt="Variant ${idx + 1}" style="margin-bottom: 1.5rem; display: block; border: 2px solid #334155;">`;
                        container.innerHTML += imgElem;
                    });
                    
                    // Update JSON Viewer
                    document.getElementById('jsonOutput').textContent = JSON.stringify(data.ai_payload, null, 2);
                    
                    // Show Results
                    results.style.display = 'grid';
                } else {
                    alert('Error: ' + JSON.stringify(data));
                }

            } catch (err) {
                alert('Connection error: ' + err.message);
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
